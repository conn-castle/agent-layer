version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - errcheck
    - gocognit
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nilerr
    - noctx
    - prealloc
    - revive
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    revive:
      rules:
        - name: exported
    dupl:
      threshold: 150
    gocognit:
      min-complexity: 150
    goconst:
      min-len: 3
      min-occurrences: 3
    staticcheck:
      # Mirror golangci-lint's default checks set but enable ST1020/ST1021/ST1022 to
      # enforce the canonical Go doc-comment form on exported funcs, types, and vars/consts
      # (belt-and-suspenders with revive `exported`). ST1000/ST1003/ST1016 stay disabled,
      # matching the default.
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      # Duplicate code in tests is acceptable for clarity
      - path: _test\.go$
        linters:
          - dupl
      # Test functions may not use t parameter but need it for signature
      - path: _test\.go$
        linters:
          - unparam
      # Prealloc in tests is not critical
      - path: _test\.go$
        linters:
          - prealloc
      # Constants in tests are often intentionally inline
      - path: _test\.go$
        linters:
          - goconst
      # Complex test functions are acceptable
      - path: _test\.go$
        linters:
          - gocognit
      # Test helpers may use exec.Command without context
      - path: _test\.go$
        linters:
          - noctx
      # gosec G204 (command injection) false positives in tests
      - path: _test\.go$
        linters:
          - gosec
        text: G204
      # This test replaces the command runner with the current test binary and
      # forwards only test-owned arguments to its helper-process entry point.
      - path: cmd/publish-site/main_test\.go$
        linters:
          - gosec
        text: G702
      # These helpers write only paths derived from t.TempDir-owned repository roots.
      - path: internal/agentdispatch/test_helpers_test\.go$
        linters:
          - gosec
        text: G703
      - path: internal/install/upgrade_readiness.*_test\.go$
        linters:
          - gosec
        text: G703
      # The fixture copier walks and writes only within two test-owned temporary trees.
      - path: internal/sync/sync_test\.go$
        linters:
          - gosec
        text: G122|G703
      # gocritic if-else chains in tests
      - path: _test\.go$
        linters:
          - gocritic
        text: ifElseChain
      # gocritic duplicate branch bodies in tests
      - path: _test\.go$
        linters:
          - gocritic
        text: dupBranchBody
      # Interactive CLI launchers intentionally use exec.Command without context
      - path: internal/clients/.*/launch\.go$
        linters:
          - noctx
      # CLI launchers use exec.Command with config-provided arguments (not tainted)
      - path: internal/clients/.*/launch\.go$
        linters:
          - gosec
        text: G204
      # MCP server connector starts servers with config-provided commands
      - path: internal/warnings/mcp_connector\.go$
        linters:
          - gosec
        text: G204
      # G101 false positives on variable names containing "Secret" or "credential"
      - path: internal/messages/
        linters:
          - gosec
        text: G101
      # config loader reads caller-resolved paths (config.toml / .env / templates) — the path
      # comes from internal callers that already resolved it via paths.AgentLayerDir(), not user input.
      - path: internal/config/load\.go$
        linters:
          - gosec
        text: G304
      # wizard tests repeatedly read files under test-controlled temporary config roots.
      - path: internal/wizard/.*_test\.go$
        linters:
          - gosec
        text: G304
      # testutil writes executable shell stubs (0o755) used by tests as PATH-shadowed binaries.
      - path: internal/testutil/
        linters:
          - gosec
        text: G306
      # Binary download uses HTTP without context (appropriate for non-cancellable downloads)
      - path: internal/dispatch/cache\.go$
        linters:
          - noctx
      # MCP connector starts external processes without context (appropriate for MCP discovery)
      - path: internal/warnings/mcp_connector\.go$
        linters:
          - noctx
      # buildClaudeSettings returns error for consistency with other build* functions
      - path: internal/sync/claude\.go$
        linters:
          - unparam
        text: buildClaudeSettings
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/conn-castle/agent-layer
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  # Disable default per-linter and per-rule caps so future findings are never silently capped.
  max-issues-per-linter: 0
  max-same-issues: 0
