name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: Install system dependencies
        run: |
          set -euo pipefail
          if ! command -v rg >/dev/null 2>&1; then
            brew install ripgrep
          fi
      - name: Validate stable release tag format
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Unsupported release tag ${GITHUB_REF_NAME}. Release publishing supports stable tags only (vX.Y.Z)."
            exit 1
          fi
      - name: Validate upgrade contract docs
        run: |
          set -euo pipefail
          make docs-upgrade-check RELEASE_TAG="${GITHUB_REF_NAME}"
      - name: Import Developer ID cert
        uses: Apple-Actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
      - name: Build release artifacts
        env:
          AL_CODESIGN_IDENTITY: "Developer ID Application: Hardware Breakout LLC (DQCZX59J6D)"
          AL_REQUIRE_CODESIGN: "1"
        run: |
          set -euo pipefail
          make release-dist AL_VERSION="${GITHUB_REF_NAME}" DIST_DIR=dist
      - name: Notarize darwin binaries
        env:
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ISSUER_ID }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          scripts/notarize-release.sh

      - name: Upload dist artifacts for downstream jobs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/*

      - name: Extract changelog for this version
        id: changelog
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"

          # Extract section between this version header and the next version header
          # - sed range: from "## vX.Y.Z " to next "## v" line
          # - tail -n +2: skip the version header line
          # - grep -v: remove the next version header if present
          # - || true: prevent grep exit code 1 when no lines match
          NOTES=$(sed -n "/^## ${VERSION} /,/^## v[0-9]/p" CHANGELOG.md | tail -n +2 | grep -v "^## v[0-9]" || true)

          # Trim leading and trailing blank lines using awk
          NOTES=$(echo "$NOTES" | awk '
            NF { found=1 }
            found { lines[++n] = $0 }
            END {
              # Find last non-blank line
              for (i=n; i>=1; i--) { if (lines[i] ~ /[^ \t]/) { last=i; break } }
              # Print from first to last non-blank
              for (i=1; i<=last; i++) print lines[i]
            }
          ')

          # Error if no changelog found for this version
          if [ -z "$NOTES" ]; then
            echo "::error::No changelog entry found for ${VERSION} in CHANGELOG.md"
            echo "::error::Ensure CHANGELOG.md has an entry like: ## ${VERSION} - YYYY-MM-DD"
            exit 1
          fi

          # Write to output using heredoc delimiter
          echo "notes<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            dist/*

  publish-website-and-tap:
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    concurrency:
      group: agent-layer-web-publish
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Checkout agent-layer at tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Ensure website publisher exists
        run: |
          set -euo pipefail
          if [ ! -f cmd/publish-site/main.go ] || [ ! -d site ]; then
            echo "::error::Website publish is mandatory, but cmd/publish-site/main.go or site/ is missing."
            exit 1
          fi

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Create GitHub App token for website repo
        id: web-app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.AGENT_LAYER_WEB_APP_ID }}
          private-key: ${{ secrets.AGENT_LAYER_WEB_APP_PRIVATE_KEY }}
          owner: conn-castle
          repositories: agent-layer-web

      - name: Checkout agent-layer-web
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: conn-castle/agent-layer-web
          ref: main
          token: ${{ steps.web-app-token.outputs.token }}
          path: agent-layer-web
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install website dependencies
        working-directory: agent-layer-web
        run: npm ci

      - name: Publish website content into Repo B checkout
        env:
          AL_NO_NETWORK: "1"
        run: |
          set -euo pipefail
          go run ./cmd/publish-site \
            --tag "${GITHUB_REF_NAME}" \
            --repo-b-dir "agent-layer-web"

      - name: Build website
        working-directory: agent-layer-web
        run: npm run build

      - name: Commit and push
        working-directory: agent-layer-web
        run: |
          set -euo pipefail
          git config user.name "agent-layer-bot"
          git config user.email "agent-layer-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Publish site for ${GITHUB_REF_NAME}"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin main; then
              exit 0
            fi
            echo "Push failed (attempt ${attempt}/3). Retrying in 2s..."
            sleep 2
          done

          echo "::error::Failed to push agent-layer-web/main after 3 attempts"
          exit 1

      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist

      - name: Create GitHub App token for tap repo
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_PRIVATE_KEY }}
          owner: conn-castle
          repositories: homebrew-tap

      - name: Checkout homebrew tap
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: conn-castle/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap

      - name: Verify release assets are available
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          SEMVER="${TAG#v}"
          ASSETS=(
            "agent-layer-${SEMVER}.tar.gz"
            "al-darwin-arm64"
            "al-linux-arm64"
            "al-linux-amd64"
          )

          for asset in "${ASSETS[@]}"; do
            URL="https://github.com/conn-castle/agent-layer/releases/download/${TAG}/${asset}"
            # Retry a few times in case GitHub is briefly eventual-consistent
            for i in 1 2 3 4 5; do
              if curl -fsIL "$URL" >/dev/null; then
                continue 2
              fi
              sleep 3
            done

            echo "::error::Release asset not reachable: $URL"
            exit 1
          done

      - name: Update binary formula
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"

          if [ ! -f "dist/checksums.txt" ]; then
            echo "::error::dist/checksums.txt not found in workflow artifacts"
            exit 1
          fi

          FORMULA="homebrew-tap/Formula/agent-layer.rb"
          if [ ! -f "${FORMULA}" ]; then
            echo "::error::${FORMULA} not found in tap repo"
            exit 1
          fi

          go run -tags tools ./internal/tools/updateformula "${FORMULA}" "${TAG}" dist/checksums.txt

          git -C homebrew-tap status --porcelain
          git -C homebrew-tap diff -- Formula/agent-layer.rb

      - name: Create PR in tap repo
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap
          branch: bump-agent-layer-${{ github.ref_name }}
          commit-message: "agent-layer ${{ github.ref_name }}"
          title: "agent-layer ${{ github.ref_name }}"
          body: "Automated formula bump for ${{ github.ref_name }}."
          base: main
