name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        id: setup-go
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache pinned tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            .tools/bin
            .cache/go-mod
          key: ${{ runner.os }}-go-tools-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.mod', 'go.sum', 'Makefile') }}
          restore-keys: |
            ${{ runner.os }}-go-tools-${{ steps.setup-go.outputs.go-version }}-
            ${{ runner.os }}-go-tools-
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Cache e2e release binaries
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/al-e2e/bin
          key: e2e-binaries-${{ runner.os }}-${{ runner.arch }}
      - name: Install pinned tools
        run: make tools
      - name: CI checks
        run: make ci
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Build release artifacts (dry run)
        run: make release-dist AL_VERSION=ci DIST_DIR=dist

  website-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agent-layer
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: Checkout agent-layer-web
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: conn-castle/agent-layer-web
          ref: main
          path: agent-layer-web
          persist-credentials: false
      - name: Build published website
        run: make website-build-check SITE_BUILD_TAG=v0.0.0 WEBSITE_REPO_DIR=agent-layer-web
