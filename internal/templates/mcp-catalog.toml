# Internal MCP server catalog used by `al wizard`.
# This file is embedded in the al binary and never written to a user repo.
# The wizard reads this catalog to populate its MCP server multiselect.
# To change the install seed, edit config.toml; to change the wizard catalog, edit this file.

[[mcp.servers]]
# Context7 docs/code lookup (requires AL_CONTEXT7_API_KEY).
id = "context7"
enabled = false
transport = "stdio"
command = "npx"
args = ["-y", "@upstash/context7-mcp@2.1.1"]
# Opt in to floating updates:
# args = ["-y", "@upstash/context7-mcp@latest"]
env = { CONTEXT7_API_KEY = "${AL_CONTEXT7_API_KEY}" }

[[mcp.servers]]
# Tavily web search/research (requires AL_TAVILY_API_KEY).
id = "tavily"
enabled = false
transport = "http"
http_transport = "streamable"
url = "https://mcp.tavily.com/mcp/?tavilyApiKey=${AL_TAVILY_API_KEY}"

[[mcp.servers]]
# Fetch URL contents (requires `uvx`).
id = "fetch"
enabled = false
transport = "stdio"
command = "uvx"
args = ["mcp-server-fetch==2025.4.7"]
# Opt in to floating updates:
# args = ["mcp-server-fetch"]

[[mcp.servers]]
# Playwright browser automation (requires Node/npx).
id = "playwright"
enabled = false
transport = "stdio"
command = "npx"
args = ["-y", "@playwright/mcp@0.0.68"]
# Opt in to floating updates:
# args = ["-y", "@playwright/mcp@latest"]
